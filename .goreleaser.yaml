# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
version: 2
pro: true

project_name: ttop

variables:
  description: "A tiny TUI that lists, filters and kills the processes running in every tmux pane."
  homepage: "https://github.com/caarlos0/ttop"
  repository: "https://github.com/caarlos0/ttop"

metadata:
  description: "A tiny TUI that lists, filters and kills the processes running in every tmux pane."
  homepage: "https://github.com/caarlos0/ttop"
  license: MIT
  maintainers:
    - Carlos Alexandro Becker <carlos@becker.software>
  commit_author:
    name: caarlosb0t
    email: bot@carlosbecker.com

includes:
  - from_url:
      url: https://raw.githubusercontent.com/caarlos0/goreleaserfiles/main/release.yml
  - from_url:
      url: https://raw.githubusercontent.com/caarlos0/goreleaserfiles/main/notary.yml

before:
  hooks:
    - rustup default stable
    - cargo install --locked cargo-zigbuild
    - cargo fetch --locked

builds:
  - builder: rust
    flags:
      - --release
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
      - x86_64-apple-darwin
      - aarch64-apple-darwin

archives:
  - formats: [tar.gz]
    # makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

source:
  enabled: true

sboms:
  - artifacts: archive

# Keyless cosign signature of the checksums file.
signs:
  - cmd: cosign
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

# Publish to npm (scoped — keeps the name namespaced under @caarlos0).
npms:
  - name: "@caarlos0/ttop"
    repository: "{{ .Metadata.Homepage }}"
    bugs: "{{ .Metadata.Homepage }}/issues"
    access: public
    keywords:
      - tmux
      - process
      - top
      - htop
      - tui
      - cli

homebrew_casks:
  - repository:
      owner: caarlos0
      name: homebrew-tap
      token: "{{ .Env.GH_PAT }}"

nfpms:
  - formats:
      - apk
      - deb
      - rpm

checksum:
  name_template: checksums.txt
